name: Database Backup

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Require backup database URL
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL is required for manual backups."
            exit 1
          fi
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      - name: Dump database
        run: |
          timestamp="$(date +%Y%m%d_%H%M%S)"
          for schema in games_library games_library_private igdb_raw; do
            supabase db dump \
              --db-url "$SUPABASE_DB_URL" \
              -f "backup_${schema}_${timestamp}.sql" \
              --schema "$schema"
          done
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_*.sql
          retention-days: 30
